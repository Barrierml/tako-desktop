  <rect x="381" y="570" width="56" height="210" rx="28" fill="#FFBCB5"/>
  <rect x="484" y="570" width="56" height="230" rx="28" fill="#FFBCB5"/>
  <rect x="587" y="570" width="56" height="210" rx="28" fill="#FFBCB5"/>
  <rect x="673" y="570" width="56" height="180" rx="28" fill="#FFBCB5"/>

  <!-- Head (big round, kawaii) -->
